name: Cleanup Old Releases

on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    - cron: "0 2 * * 0" # Run weekly on Sunday at 2 AM UTC

jobs:
  cleanup-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to delete releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup old releases
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MAINTENANCE_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const releasesToKeep = 10;

            console.log(`Fetching releases for ${owner}/${repo}...`);

            try {
              // Get all releases sorted by created_at (newest first by default)
              const releases = await github.paginate(
                github.rest.repos.listReleases,
                {
                  owner,
                  repo,
                  per_page: 100
                }
              );

              console.log(`Found ${releases.length} total releases`);

              if (releases.length <= releasesToKeep) {
                console.log(`Only ${releases.length} releases found. Nothing to clean up.`);
                return;
              }

              // Sort by created_at to ensure we keep the newest ones
              releases.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

              // Identify releases to delete (all except the most recent N)
              const releasesToDelete = releases.slice(releasesToKeep);

              console.log(`Will delete ${releasesToDelete.length} old releases`);

              for (const release of releasesToDelete) {
                console.log(`Deleting release: ${release.name || release.tag_name} (${release.tag_name})`);

                try {
                  // Delete the release
                  await github.rest.repos.deleteRelease({
                    owner,
                    repo,
                    release_id: release.id
                  });

                  console.log(`✓ Deleted release: ${release.tag_name}`);

                  // Optionally delete the associated tag
                  try {
                    await github.rest.git.deleteRef({
                      owner,
                      repo,
                      ref: `tags/${release.tag_name}`
                    });
                    console.log(`✓ Deleted tag: ${release.tag_name}`);
                  } catch (tagError) {
                    console.log(`⚠ Could not delete tag ${release.tag_name}: ${tagError.message}`);
                  }

                } catch (error) {
                  console.error(`✗ Failed to delete release ${release.tag_name}: ${error.message}`);
                }
              }

              console.log('Cleanup completed successfully!');

            } catch (error) {
              console.error(`Error during cleanup: ${error.message}`);
              throw error;
            }

      - name: Cleanup old workflow runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MAINTENANCE_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const workflowRunsToKeep = 20;

            console.log(`Fetching workflow runs for ${owner}/${repo}...`);

            try {
              // Get all workflows in the repository
              const workflows = await github.paginate(
                github.rest.actions.listRepoWorkflows,
                {
                  owner,
                  repo,
                  per_page: 100
                }
              );

              console.log(`Found ${workflows.length} workflows`);

              for (const workflow of workflows) {
                console.log(`Processing workflow: ${workflow.name} (${workflow.id})`);

                // Get all runs for this workflow
                const runs = await github.paginate(
                  github.rest.actions.listWorkflowRuns,
                  {
                    owner,
                    repo,
                    workflow_id: workflow.id,
                    per_page: 100
                  }
                );

                console.log(`  Found ${runs.length} runs for workflow ${workflow.name}`);

                if (runs.length <= workflowRunsToKeep) {
                  console.log(`  Only ${runs.length} runs found. Nothing to clean up.`);
                  continue;
                }

                // Sort by created_at to ensure we keep the newest ones
                runs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                // Identify runs to delete (all except the most recent N)
                const runsToDelete = runs.slice(workflowRunsToKeep);

                console.log(`  Will delete ${runsToDelete.length} old runs`);

                for (const run of runsToDelete) {
                  try {
                    await github.rest.actions.deleteWorkflowRun({
                      owner,
                      repo,
                      run_id: run.id
                    });
                    console.log(`  ✓ Deleted run #${run.run_number} (${run.created_at})`);
                  } catch (error) {
                    console.error(`  ✗ Failed to delete run #${run.run_number}: ${error.message}`);
                  }
                }
              }

              console.log('Workflow runs cleanup completed successfully!');

            } catch (error) {
              console.error(`Error during workflow runs cleanup: ${error.message}`);
              throw error;
            }
